<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FakeTrace Workbench</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">FakeTrace Workbench</p>
          <h1>本地图片取证工作台</h1>
          <p class="subtitle">
            现在这个网页已经同时支持两类能力：MARC 负责图片真伪检测，TruFor 负责篡改区域定位。
            后续你继续加别的功能，也可以沿着这个模块化结构继续扩展。
          </p>
        </div>
        <div class="status-card">
          <span class="status-dot"></span>
          <div>
            <p class="status-label">运行状态</p>
            <p class="status" id="status">正在检查 MARC 与 TruFor 模型状态...</p>
          </div>
        </div>
      </section>

      <section class="feature-tabs" aria-label="功能切换">
        <button class="feature-tab active" id="tab-detector" type="button" data-mode="detector">真伪检测</button>
        <button class="feature-tab" id="tab-localizer" type="button" data-mode="localizer">篡改定位</button>
      </section>

      <section class="control-panel">
        <div class="dropzone" id="dropzone">
          <input id="fileInput" type="file" accept="image/*" multiple>
          <div class="drop-art">
            <span class="drop-plus">+</span>
          </div>
          <div class="drop-copy">
            <strong id="dropTitle">拖拽图片到这里，或点击选择文件</strong>
            <span id="dropHint">真伪检测支持一次上传多张图片；篡改定位会逐张返回热力图、叠加图和可疑区域占比。</span>
          </div>
        </div>

        <div class="actions">
          <button id="pickButton" type="button">选择图片</button>
          <button id="runButton" type="button" disabled>开始处理</button>
          <button id="clearButton" type="button" disabled>清空列表</button>
        </div>
      </section>

      <section class="summary" id="summary" hidden></section>
      <section class="results" id="results" aria-live="polite"></section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
