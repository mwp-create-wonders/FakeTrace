<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FakeTrace</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">FakeTrace Workbench</p>
          <h1>多模态数字取证工作台</h1>
          <p class="subtitle">图像检测、篡改定位、音频检测、视频检测与项目安全扫描统一接入。</p>
        </div>
        <div class="hero-side">
          <article class="status-card">
            <p class="card-kicker">运行状态</p>
            <p class="status" id="status">正在检查模型与扫描能力...</p>
          </article>
          <article class="status-card">
            <p class="card-kicker">当前模式</p>
            <p class="mode-title" id="modeTitle">图像检测</p>
            <p class="mode-desc" id="modeDescription">批量图片真伪识别与概率输出</p>
          </article>
        </div>
      </section>

      <section class="feature-tabs" aria-label="功能切换">
        <button class="feature-tab active" type="button" data-mode="detector">图像检测</button>
        <button class="feature-tab" type="button" data-mode="localizer">篡改定位</button>
        <button class="feature-tab" type="button" data-mode="audio">音频检测</button>
        <button class="feature-tab" type="button" data-mode="video">视频检测</button>
        <button class="feature-tab" type="button" data-mode="security">安全扫描</button>
      </section>

      <section class="control-panel">
        <div class="dropzone" id="dropzone">
          <input id="fileInput" type="file" multiple>
          <div class="dropzone-copy">
            <span class="drop-label" id="dropLabel">输入区</span>
            <strong id="dropTitle">拖拽文件到这里，或点击选择</strong>
            <span id="dropHint">支持批量上传。</span>
          </div>
        </div>

        <div class="controls-row">
          <div class="model-selector" id="modelSelector">
            <label for="modelSelect" id="modelSelectLabel">选择模型</label>
            <select id="modelSelect"></select>
          </div>
          <div class="actions">
            <button id="runButton" type="button" disabled>开始检测</button>
            <button id="clearButton" type="button" disabled>清空</button>
          </div>
        </div>
      </section>

      <section class="workspace-head">
        <div>
          <p class="card-kicker">Results</p>
          <h2>分析结果</h2>
        </div>
      </section>

      <section class="summary" id="summary" hidden></section>
      <section class="results" id="results" aria-live="polite"></section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
