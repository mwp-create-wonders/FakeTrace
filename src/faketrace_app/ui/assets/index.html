<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FakeTrace Workbench</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">FakeTrace Workbench</p>
          <h1>AIGC多模态取证系统</h1>
          <p class="subtitle">
            支持图像、视频和音频的多模态取证功能
          </p>
        </div>
        <div class="status-card">
          <span class="status-dot"></span>
          <div>
            <p class="status-label">运行状态</p>
            <p class="status" id="status">正在检查 MARC、TruFor 与 ATADD 模型状态...</p>
          </div>
        </div>
      </section>

      <section class="feature-tabs" aria-label="功能切换">
        <button class="feature-tab active" id="tab-detector" type="button" data-mode="detector">真伪检测</button>
        <button class="feature-tab" id="tab-localizer" type="button" data-mode="localizer">篡改定位</button>
        <button class="feature-tab" id="tab-audio" type="button" data-mode="audio">音频检测</button>
        <button class="feature-tab" id="tab-video" type="button" data-mode="video">视频检测</button>
      </section>

      <section class="control-panel">
        <div class="dropzone" id="dropzone">
          <input id="fileInput" type="file" accept="image/*" multiple>
          <div class="drop-art">
            <span class="drop-plus">+</span>
          </div>
          <div class="drop-copy">
            <strong id="dropTitle">拖拽图片到这里，或点击选择文件</strong>
            <span id="dropHint">真伪检测支持一次上传多张图片，返回 Real / Fake 判断与概率分布。</span>
          </div>
        </div>

        <div class="controls-row">
          <div class="model-selector" id="modelSelector" hidden>
            <label for="modelSelect" id="modelSelectLabel">选择模型：</label>
            <select id="modelSelect">
              <option value="trufor">TruFor</option>
              <option value="catnet">CAT-Net</option>
              <option value="fassa">Fassa</option>
              <option value="effunetpp">EffUnetPP</option>
            </select>
          </div>

          <div class="actions">
            <button id="pickButton" type="button">选择图片</button>
            <button id="runButton" type="button" disabled>开始检测</button>
            <button id="clearButton" type="button" disabled>清空列表</button>
          </div>
        </div>
      </section>

      <section class="summary" id="summary" hidden></section>
      <section class="results" id="results" aria-live="polite"></section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
